<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aveline — the agent-friendly wiki</title>
    <meta
      name="description"
      content="An open-source, agent-friendly wiki — a clean read for humans, an API for agents."
    />

    <!-- Open Graph (Slack, Facebook, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aveline.ai/" />
    <meta property="og:site_name" content="Aveline" />
    <meta property="og:title" content="The agent-friendly wiki" />
    <meta
      property="og:description"
      content="An open-source, agent-friendly wiki — a clean read for humans, an API for agents."
    />
    <meta property="og:image" content="https://aveline.ai/og.png" />
    <meta property="og:image:secure_url" content="https://aveline.ai/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Aveline — the agent-friendly wiki" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The agent-friendly wiki" />
    <meta
      name="twitter:description"
      content="An open-source, agent-friendly wiki — a clean read for humans, an API for agents."
    />
    <meta name="twitter:image" content="https://aveline.ai/og.png" />

    <meta name="theme-color" content="#08080a" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
        height: 100dvh;
        width: 100vw;
      }

      .pane {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      /* ────────────────────────────────────────────────────────────
         LEFT PANE — human side
         warm parchment background, organic flowing animation
      ──────────────────────────────────────────────────────────── */

      .pane.human {
        background: #efe8d6;
        color: #1a1410;
      }

      .pane.human::before {
        /* paper grain */
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.06;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        mix-blend-mode: multiply;
      }

      .canvas-organic {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .pane.human .content {
        position: relative;
        z-index: 2;
        max-width: 26rem;
        text-align: left;
        animation: rise-left 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes rise-left {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .pane.human .pane-label {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(26, 20, 16, 0.72);
        margin-bottom: 1.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
      }

      .pane.human .pane-label::before {
        content: "";
        width: 24px;
        height: 1.5px;
        background: rgba(26, 20, 16, 0.55);
      }

      .pane.human h1 {
        font-family: "Fraunces", "Inter", serif;
        font-weight: 500;
        font-size: clamp(2rem, 4vw, 3.4rem);
        letter-spacing: -0.025em;
        line-height: 1.05;
        font-variation-settings: "opsz" 80;
      }

      .pane.human h1 .you {
        font-style: italic;
        position: relative;
        z-index: 0;
        padding: 0 0.06em;
      }

      .pane.human h1 .you::before {
        content: "";
        position: absolute;
        inset: 0.22em -0.05em 0.08em -0.05em;
        background: rgba(212, 152, 80, 0.55);
        transform: rotate(-1.5deg);
        transform-origin: center;
        z-index: -1;
        border-radius: 1px;
      }

      /* ────────────────────────────────────────────────────────────
         RIGHT PANE — agent side
         deep dark, monospaced, matrix-style cascade
      ──────────────────────────────────────────────────────────── */

      .pane.agent {
        background: #08080a;
        color: #e8e8e8;
      }

      .canvas-matrix {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .pane.agent::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          rgba(8, 8, 10, 0.55) 0%,
          rgba(8, 8, 10, 0.8) 55%,
          rgba(8, 8, 10, 0.95) 100%
        );
      }

      .pane.agent .content {
        position: relative;
        z-index: 2;
        max-width: 30rem;
        text-align: left;
        animation: rise-right 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes rise-right {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .pane.agent .pane-label {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(232, 232, 232, 0.78);
        margin-bottom: 1.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
      }

      .pane.agent .pane-label::before {
        content: "";
        width: 24px;
        height: 1.5px;
        background: rgba(232, 232, 232, 0.6);
      }

      .pane.agent h1 {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 500;
        font-size: clamp(1.45rem, 2.7vw, 2.2rem);
        letter-spacing: -0.015em;
        line-height: 1.22;
        color: #f5f5f5;
      }

      .pane.agent h1 .you {
        color: #3B82F6;
        text-shadow: 0 0 18px rgba(59, 130, 246, 0.35);
      }

      /* ────────────────────────────────────────────────────────────
         In-pane branding — anchored into each pane's aesthetic
      ──────────────────────────────────────────────────────────── */

      .pane-brand {
        position: absolute;
        top: 1.75rem;
        z-index: 3;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
      }

      .pane.human .pane-brand {
        left: 2rem;
        color: rgba(26, 20, 16, 0.78);
      }

      .pane.human .pane-brand .mark {
        width: 26px;
        height: 26px;
        display: block;
        flex: none;
      }

      .pane.agent .pane-brand {
        right: 2rem;
        color: rgba(232, 232, 232, 0.8);
        text-decoration: none;
        transition: color 0.2s;
      }

      .pane.agent .pane-brand:hover {
        color: #f5f5f5;
      }

      .pane.agent .pane-brand svg {
        width: 14px;
        height: 14px;
        opacity: 0.85;
      }

      .pane.agent .pane-brand::after {
        content: "↗";
        font-size: 0.85em;
        opacity: 0.7;
      }

      /* ────────────────────────────────────────────────────────────
         CTA — "TERMINAL & TICKET"
         Two free-standing buttons centered on the seam with breathing
         room between them. Each themed to its own world:
           .try    → warm tactile cream pill (the human/product "ticket")
           .deploy → dark monospace terminal command chip (the agent dev world)
      ──────────────────────────────────────────────────────────── */

      .cta {
        position: fixed;
        left: 50%;
        top: 50%; /* line up with the two headlines' vertical center */
        transform: translate(-50%, -50%);
        z-index: 6;
        /* equal halves so the gap between the buttons lands exactly on
           the page's center seam, no matter the buttons' own widths */
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        column-gap: 2.2rem;
        width: min(880px, 94vw);
        animation: cta-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }

      @keyframes cta-in {
        from {
          opacity: 0;
          transform: translate(-50%, calc(-50% + 16px));
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }

      .cta-btn {
        position: relative;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        white-space: nowrap;
        transition: transform 0.22s ease, box-shadow 0.22s ease,
          background-color 0.22s ease, color 0.22s ease,
          border-color 0.22s ease;
      }

      .cta-btn:focus-visible {
        outline: 2px solid #3B82F6;
        outline-offset: 4px;
      }

      /* ── "Try it" — warm tactile cream pill (the ticket) ──────────── */
      .cta-btn.try {
        justify-self: end; /* hug the seam from the left */
        font-family: "Fraunces", "Inter", serif;
        font-weight: 500;
        font-size: 1.42rem;
        letter-spacing: -0.01em;
        font-variation-settings: "opsz" 40;
        gap: 0.7rem;
        padding: 1.35rem 3.1rem;
        border-radius: 999px;
        background: #faf6ec;
        color: #1a1410;
        border: 1px solid rgba(26, 20, 16, 0.12);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.9) inset,
          0 14px 30px -14px rgba(26, 20, 16, 0.55),
          0 4px 10px rgba(26, 20, 16, 0.14);
      }

      .cta-btn.try::before {
        /* gold dot accent — a little handmade ticket punch */
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: rgba(212, 152, 80, 1);
        box-shadow: 0 0 0 3px rgba(212, 152, 80, 0.25);
        transition: transform 0.22s ease;
      }

      .cta-btn.try:hover {
        transform: translateY(-3px);
        background: #fffdf6;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.95) inset,
          0 22px 40px -16px rgba(26, 20, 16, 0.6),
          0 6px 14px rgba(26, 20, 16, 0.2);
      }

      .cta-btn.try:hover::before {
        transform: scale(1.25);
      }

      .cta-btn.try:active {
        transform: translateY(-1px);
      }

      /* ── "Deploy it" — dark terminal command chip ────────────────── */
      .cta-btn.deploy {
        justify-self: start; /* hug the seam from the right */
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 500;
        font-size: 1.18rem;
        letter-spacing: 0.01em;
        gap: 0.55rem;
        padding: 1.28rem 2.3rem;
        border-radius: 11px;
        background: #0c0c10;
        color: #3B82F6;
        border: 1px solid rgba(59, 130, 246, 0.28);
        box-shadow:
          0 14px 34px -14px rgba(0, 0, 0, 0.7),
          0 4px 12px rgba(0, 0, 0, 0.3),
          0 0 0 0 rgba(59, 130, 246, 0);
      }

      .cta-btn.deploy::before {
        /* terminal prompt prefix */
        content: "›";
        color: rgba(59, 130, 246, 0.65);
        font-weight: 600;
        margin-right: 0.1rem;
      }

      .cta-btn.deploy .arrow {
        color: #3B82F6;
        margin-left: 0.15rem;
        transition: transform 0.22s ease;
      }

      .cta-btn.deploy:hover {
        transform: translateY(-3px);
        background: #101018;
        border-color: rgba(59, 130, 246, 0.55);
        color: #4F8EF7;
        box-shadow:
          0 22px 44px -16px rgba(0, 0, 0, 0.75),
          0 6px 16px rgba(0, 0, 0, 0.4),
          0 0 22px -4px rgba(59, 130, 246, 0.4);
      }

      .cta-btn.deploy:hover .arrow {
        transform: translate(2px, -2px);
      }

      .cta-btn.deploy:active {
        transform: translateY(-1px);
      }

      /* ────────────────────────────────────────────────────────────
         Medium screens (tablets / laptops) — panes are still side-by-side,
         but narrow enough that two buttons on the seam would crowd the
         headlines. Keep the CTA fixed and centered on the seam, but stack
         the buttons vertically and sit them in the lower-center, clear of
         the headlines.
      ──────────────────────────────────────────────────────────── */

      @media (min-width: 721px) and (max-width: 1900px) {
        .cta {
          top: auto;
          bottom: 7vh;
          transform: translateX(-50%);
          animation: none;
          width: auto;
          grid-template-columns: minmax(0, 300px);
          justify-content: center;
          column-gap: 0;
          row-gap: 0.85rem;
        }
        .cta-btn {
          justify-self: stretch;
        }
      }

      /* ────────────────────────────────────────────────────────────
         Mobile — stack vertically
      ──────────────────────────────────────────────────────────── */

      @media (max-width: 720px) {
        html,
        body {
          height: auto;
          overflow-x: hidden;
        }

        .split {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
          min-height: 100dvh;
        }

        .pane {
          min-height: 50vh;
          min-height: 50dvh;
          padding: 4rem 1.5rem;
          /* stack as a column so content left-aligns to the padding edge
             (instead of shrink-wrapping and centering) — shares a left
             edge with the CTA buttons below */
          flex-direction: column;
          align-items: stretch;
        }

        /* content fills the column and left-aligns, capped to a tidy
           measure that matches the CTA column width */
        .pane.human .content,
        .pane.agent .content {
          width: 100%;
          max-width: 30rem;
          margin: 0;
        }

        .pane-brand {
          top: 1.25rem;
          font-size: 0.72rem;
        }

        .pane.human .pane-brand {
          left: 1.5rem;
        }

        /* Pin GitHub icon to the viewport top-right. Just the logo, no
           background — softer and less weird than a floating pill. Color
           matches the warm-dark of the human pane (where the icon mostly
           sits on a single-screen mobile layout). */
        .pane.agent .pane-brand {
          position: fixed;
          top: 1.1rem;
          right: 1.1rem;
          z-index: 20;
          padding: 0.35rem;
          background: transparent;
          border: none;
          color: rgba(26, 20, 16, 0.7);
        }

        .pane.agent .pane-brand:hover,
        .pane.agent .pane-brand:active {
          color: rgba(26, 20, 16, 0.95);
        }

        .pane.agent .pane-brand svg {
          width: 22px;
          height: 22px;
          opacity: 1;
        }

        .pane.agent .pane-brand .pane-brand-text,
        .pane.agent .pane-brand::after {
          display: none;
          content: none;
        }

        /* On mobile the CTA leaves fixed positioning and flows in the
           normal document order — between the two stacked panes — as a
           warm band that continues the human side. So it never overlaps
           pane content, and the two headlines hug it from above/below. */
        .pane.human {
          justify-content: flex-end;
          padding-bottom: 1.5rem;
        }
        /* Agent label hugs the CTA band from below, mirroring "For humans"
           above it. The headline is dropped on mobile (it just repeats the
           human one) — leaving the label sitting in the trippy matrix bg. */
        .pane.agent {
          justify-content: flex-start;
          padding-top: 1.5rem;
        }
        .pane.agent h1 {
          display: none;
        }

        .cta {
          position: static;
          transform: none;
          animation: none;
          width: 100%;
          /* same 30rem max column as the content, left-aligned, so the
             buttons share a left edge with the headline above */
          grid-template-columns: minmax(0, 30rem);
          justify-content: start;
          align-items: stretch;
          column-gap: 0;
          row-gap: 0.85rem;
          padding: 2rem 1.5rem 2.4rem;
          background: #efe8d6;
        }

        .cta-btn {
          width: 100%;
          justify-self: stretch;
        }

        .cta-btn.try {
          padding: 1.05rem 1.5rem;
        }

        .cta-btn.deploy {
          padding: 1.05rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="split">
      <!-- LEFT: human / wiki -->
      <section class="pane human">
        <canvas class="canvas-organic"></canvas>
        <div class="pane-brand">
          <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <clipPath id="brandMark">
                <rect x="1" y="1" width="30" height="30" rx="7.5" />
              </clipPath>
            </defs>
            <g clip-path="url(#brandMark)">
              <rect x="0" y="0" width="16" height="32" fill="#ffffff" />
              <rect x="16" y="0" width="16" height="32" fill="#08080a" />
              <rect x="15.4" y="0" width="1.2" height="32" fill="#3B82F6" opacity="0.9" />
              <circle cx="8.4" cy="16" r="3.4" fill="#1a1410" />
              <rect x="22" y="9.5" width="3.4" height="13" rx="1.7" fill="#3B82F6" />
            </g>
            <rect x="1" y="1" width="30" height="30" rx="7.5" fill="none" stroke="#1a1410" stroke-opacity="0.55" stroke-width="1.5" />
          </svg>
          Aveline
        </div>
        <div class="content">
          <div class="pane-label">For humans</div>
          <h1>A wiki <span class="you">you</span> can<br />easily understand.</h1>
        </div>
      </section>

      <!-- CTA: terminal & ticket pair. On desktop it's position:fixed and
           centered on the seam (lifted out of the grid, so the panes still
           form two columns). On mobile it drops into normal flow here,
           between the stacked panes — no overlap with pane content.
             .try    → app  ·  .deploy → GitHub repo -->
      <nav class="cta" aria-label="Get started">
        <a class="cta-btn try" href="https://app.aveline.ai">Try it</a>
        <a class="cta-btn deploy" href="https://github.com/aveline-ai/aveline" target="_blank" rel="noopener">
          Deploy it<span class="arrow" aria-hidden="true">↗</span>
        </a>
      </nav>

      <!-- RIGHT: agent / api -->
      <section class="pane agent">
        <canvas class="canvas-matrix"></canvas>
        <a class="pane-brand" href="https://github.com/aveline-ai" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
            ></path>
          </svg>
          <span class="pane-brand-text">view code</span>
        </a>
        <div class="content">
          <div class="pane-label">For agents</div>
          <h1>A wiki <span class="you">it</span> can<br />easily understand.</h1>
        </div>
      </section>
    </div>

    <script>
      /* ============================================================
         LEFT — organic side: slow sine waves + drifting soft motes
      ============================================================ */
      (function () {
        const canvas = document.querySelector(".canvas-organic");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const DPR = Math.min(window.devicePixelRatio || 1, 2);

        let w = 0;
        let h = 0;
        let t = 0;
        let motes = [];

        function resize() {
          w = canvas.parentElement.clientWidth;
          h = canvas.parentElement.clientHeight;
          canvas.width = w * DPR;
          canvas.height = h * DPR;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
          seed();
        }

        function seed() {
          motes = [];
          const count = Math.round((w * h) / 22000);
          for (let i = 0; i < count; i++) {
            motes.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: 1 + Math.random() * 2.5,
              vx: (Math.random() - 0.5) * 0.08,
              vy: (Math.random() - 0.5) * 0.08,
              phase: Math.random() * Math.PI * 2,
              freq: 0.005 + Math.random() * 0.008,
              alpha: 0.06 + Math.random() * 0.1,
            });
          }
        }

        let raf = 0;
        function tick() {
          ctx.clearRect(0, 0, w, h);
          t += 1;

          // sine wave bands (slow horizontal ribbons) — visible but unobtrusive
          const waveCount = 4;
          for (let band = 0; band < waveCount; band++) {
            const yBase = h * (0.18 + band * 0.2);
            const amp = h * 0.08;
            const speed = t * 0.005 * (band + 1) * 0.4;
            ctx.beginPath();
            for (let x = 0; x <= w; x += 4) {
              const y =
                yBase +
                Math.sin((x / (140 + band * 60)) + speed + band) * amp +
                Math.sin((x / 320) + speed * 0.5) * (amp * 0.35);
              if (x === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            const baseAlpha = 0.13 - band * 0.02;
            ctx.strokeStyle = "rgba(26,20,16," + baseAlpha + ")";
            ctx.lineWidth = 1.15;
            ctx.stroke();
          }

          // motes drifting on bezier-y paths
          for (const m of motes) {
            m.phase += m.freq;
            m.x += m.vx + Math.cos(m.phase) * 0.2;
            m.y += m.vy + Math.sin(m.phase) * 0.15;
            if (m.x < -10) m.x = w + 10;
            else if (m.x > w + 10) m.x = -10;
            if (m.y < -10) m.y = h + 10;
            else if (m.y > h + 10) m.y = -10;

            ctx.fillStyle = "rgba(26,20,16," + (m.alpha + 0.03) + ")";
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
            ctx.fill();
          }

          raf = requestAnimationFrame(tick);
        }

        function start() {
          if (!raf) raf = requestAnimationFrame(tick);
        }
        function stop() {
          if (raf) cancelAnimationFrame(raf);
          raf = 0;
        }

        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)");
        function obey() {
          stop();
          if (!reduced.matches) start();
        }

        window.addEventListener("resize", () => {
          resize();
        });
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) stop();
          else obey();
        });
        reduced.addEventListener && reduced.addEventListener("change", obey);

        resize();
        obey();
      })();

      /* ============================================================
         RIGHT — agent side: matrix-style character cascade
      ============================================================ */
      (function () {
        const canvas = document.querySelector(".canvas-matrix");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const DPR = Math.min(window.devicePixelRatio || 1, 2);

        let w = 0;
        let h = 0;
        let cols = 0;
        let drops = [];
        const FONT_SIZE = 14;
        const CHARS =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}[]<>=/+-*?!#$%&";

        function resize() {
          w = canvas.parentElement.clientWidth;
          h = canvas.parentElement.clientHeight;
          canvas.width = w * DPR;
          canvas.height = h * DPR;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
          cols = Math.ceil(w / FONT_SIZE);
          drops = new Array(cols).fill(0).map(() => ({
            y: -Math.random() * h,
            speed: 0.4 + Math.random() * 1.0,
            len: 8 + Math.floor(Math.random() * 18),
          }));
        }

        let raf = 0;
        function tick() {
          // trail fade — slightly stronger so the screen doesn't crowd with white
          ctx.fillStyle = "rgba(8,8,10,0.24)";
          ctx.fillRect(0, 0, w, h);

          ctx.font = FONT_SIZE + "px 'JetBrains Mono', monospace";
          ctx.textBaseline = "top";

          for (let i = 0; i < drops.length; i++) {
            const d = drops[i];
            const x = i * FONT_SIZE;
            // head — softer, not blinding
            const headChar = CHARS[(Math.random() * CHARS.length) | 0];
            ctx.fillStyle = "rgba(245,245,245,0.55)";
            ctx.fillText(headChar, x, d.y);

            // tail
            for (let k = 1; k < d.len; k++) {
              const yy = d.y - k * FONT_SIZE;
              if (yy < -FONT_SIZE) break;
              const alpha = (1 - k / d.len) * 0.22;
              ctx.fillStyle = "rgba(245,245,245," + alpha + ")";
              const c = CHARS[(Math.random() * CHARS.length) | 0];
              ctx.fillText(c, x, yy);
            }

            d.y += FONT_SIZE * d.speed * 0.55;
            if (d.y > h + d.len * FONT_SIZE) {
              d.y = -Math.random() * h * 0.5;
              d.speed = 0.4 + Math.random() * 1.0;
              d.len = 8 + Math.floor(Math.random() * 18);
            }
          }

          raf = requestAnimationFrame(tick);
        }

        function start() {
          if (!raf) raf = requestAnimationFrame(tick);
        }
        function stop() {
          if (raf) cancelAnimationFrame(raf);
          raf = 0;
        }

        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)");
        function obey() {
          stop();
          if (!reduced.matches) start();
        }

        window.addEventListener("resize", resize);
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) stop();
          else obey();
        });
        reduced.addEventListener && reduced.addEventListener("change", obey);

        resize();
        obey();
      })();
    </script>
  </body>
</html>
