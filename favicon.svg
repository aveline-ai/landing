<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Aveline"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><defs>
    <clipPath id="r">
      <rect x="1" y="1" width="30" height="30" rx="7.5"></rect>
    </clipPath>
  </defs><g clip-path="url(#r)">
    <!-- human half: warm parchment -->
    <rect x="0" y="0" width="16" height="32" fill="#ffffff"></rect>
    <!-- agent half: deep dark -->
    <rect x="16" y="0" width="16" height="32" fill="#08080a"></rect>
    <!-- seam where the two sides meet -->
    <rect x="15.4" y="0" width="1.2" height="32" fill="#3B82F6" opacity="0.9"></rect>
    <!-- human side: organic ink dot -->
    <circle cx="8.4" cy="16" r="3.4" fill="#1a1410"></circle>
    <!-- agent side: terminal cursor / caret -->
    <rect x="22" y="9.5" width="3.4" height="13" rx="1.7" fill="#3B82F6"></rect>
  </g><rect x="1" y="1" width="30" height="30" rx="7.5" fill="none" stroke="#1a1410" stroke-opacity="0.55" stroke-width="1.5"></rect></svg>