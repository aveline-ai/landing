<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aveline">
  <defs>
    <clipPath id="r">
      <rect x="1" y="1" width="30" height="30" rx="7.5" />
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- human half: warm parchment -->
    <rect x="0" y="0" width="16" height="32" fill="#ffffff" />
    <!-- agent half: deep dark -->
    <rect x="16" y="0" width="16" height="32" fill="#08080a" />
    <!-- seam where the two sides meet -->
    <rect x="15.4" y="0" width="1.2" height="32" fill="#6ee7b7" opacity="0.9" />
    <!-- human side: organic ink dot -->
    <circle cx="8.4" cy="16" r="3.4" fill="#1a1410" />
    <!-- agent side: terminal cursor / caret -->
    <rect x="22" y="9.5" width="3.4" height="13" rx="1.7" fill="#6ee7b7" />
  </g>
  <rect x="1" y="1" width="30" height="30" rx="7.5" fill="none" stroke="#1a1410" stroke-opacity="0.55" stroke-width="1.5" />
</svg>
